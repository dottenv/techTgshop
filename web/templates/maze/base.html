<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TechTGShop - Панель управления{% endblock %}</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="shortcut icon" href="data:image/svg+xml,%3csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2033%2034'%20fill-rule='evenodd'%20stroke-linejoin='round'%20stroke-miterlimit='2'%20xmlns:v='https://vecta.io/nano'%3e%3cpath%20d='M3%2027.472c0%204.409%206.18%205.552%2013.5%205.552%207.281%200%2013.5-1.103%2013.5-5.513s-6.179-5.552-13.5-5.552c-7.281%200-13.5%201.103-13.5%205.513z'%20fill='%23435ebe'%20fill-rule='nonzero'/%3e%3ccircle%20cx='16.5'%20cy='8.8'%20r='8.8'%20fill='%2341bbdd'/%3e%3c/svg%3e" type="image/x-icon">
    
    <!-- Maze CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='maze/assets/compiled/css/app.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='maze/assets/compiled/css/app-dark.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='maze/assets/compiled/css/iconly.css') }}">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    {% block extra_css %}{% endblock %}
</head>
<body>
    <div id="app-initial-preloader">
        <div class="preloader-content text-center">
            <div class="spinner-border text-primary spinner-main" role="status">
                <span class="visually-hidden">Загрузка...</span>
            </div>
            <div class="mt-3 h4 fw-bold text-primary">TechTGShop</div>
        </div>
    </div>

    <!-- Mini Spinner for SPA -->
    <div id="spa-mini-spinner">
        <div class="spinner-border text-primary" role="status" style="width: 1.2rem; height: 1.2rem; border-width: 0.15em;">
            <span class="visually-hidden">Загрузка...</span>
        </div>
    </div>

    <script src="{{ url_for('static', filename='maze/assets/static/js/initTheme.js') }}"></script>
    
    <div id="app">
        <!-- Sidebar -->
        {% include 'maze/components/sidebar.html' %}
        
        <div id="main">
            <div id="main-content">
                <div class="page-content" data-spa-content>
                    {% block content %}{% endblock %}
                </div>
            </div>
        </div>
    </div>

    <!-- Maze JS -->
    <script src="{{ url_for('static', filename='maze/assets/static/js/components/dark.js') }}"></script>
    <script src="{{ url_for('static', filename='maze/assets/extensions/perfect-scrollbar/perfect-scrollbar.min.js') }}"></script>
    <script src="{{ url_for('static', filename='maze/assets/compiled/js/app.js') }}"></script>
    
    <!-- App Core JS -->
    <script src="{{ url_for('static', filename='js/core/app.js') }}"></script>
    
    <!-- App Configuration -->
    <script data-app-config type="application/json">
    {
        "debug": {% if config.DEBUG %}true{% else %}false{% endif %},
        "enableSPA": true,
        "enablePreloader": true,
        "enableErrorHandling": true
    }
    </script>
    
    <!-- SPA Configuration -->
    <script data-spa-config type="application/json">
    {
        "enableHistory": true,
        "enableCache": true,
        "enablePrefetch": true,
        "cacheTimeout": 300000,
        "showErrorModal": true
    }
    </script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
